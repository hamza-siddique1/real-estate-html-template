<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Listings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { background: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    /* ── Filter Bar ── */
    .filter-bar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 9px 24px;
      position: sticky; top: 0; z-index: 100;
    }

    /* All shared button/select height */
    .filter-bar .form-select,
    .filter-bar .fb-btn {
      height: 38px;
      font-size: 13.5px;
      font-weight: 500;
      border-radius: 8px;
      line-height: 1;
    }

    /* Dropdowns (All Listings, Both/Sold) */
    .filter-bar .form-select {
      color: #374151;
      border: 1px solid #cbd5e1;
      background-color: #fff;
      padding: 0 32px 0 12px;
      cursor: pointer;
    }
    .filter-bar .form-select:focus { box-shadow: none; border-color: #94a3b8; }

    /* Base button reset */
    .fb-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0 14px;
      cursor: pointer;
      background: #fff;
      border: 1px solid #cbd5e1;
      color: #374151;
      white-space: nowrap;
    }
    .fb-btn:hover { background: #f9fafb; }

    /* Advanced — green border + green icon + text */
    .fb-btn-advanced {
      border: 1.5px solid #16a34a;
      color: #16a34a;
    }
    .fb-btn-advanced:hover { background: #f0fdf4; }
    .fb-btn-advanced svg { stroke: #16a34a; }

    /* Save Search — plain gray */
    .fb-btn-save { color: #6b7280; border-color: #d1d5db; }
    .fb-btn-save svg { stroke: #9ca3af; }

    /* Image Search & Compare — gradient border, gradient text */
    .fb-btn-gradient {
      border: 1.5px solid transparent;
      background:
        linear-gradient(#fff, #fff) padding-box,
        linear-gradient(90deg, #f97316, #ec4899, #a855f7) border-box;
    }
    .fb-btn-gradient:hover {
      background:
        linear-gradient(#fff8f5, #fff8f5) padding-box,
        linear-gradient(90deg, #f97316, #ec4899, #a855f7) border-box;
    }
    .fb-gradient-text {
      background: linear-gradient(90deg, #f97316 0%, #ec4899 55%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
    }
    /* Compare split — dropdown toggle part */
    .fb-btn-compare-split {
      border: 1.5px solid transparent;
      background:
        linear-gradient(#fff, #fff) padding-box,
        linear-gradient(90deg, #ec4899, #a855f7) border-box;
      border-left: none !important;
      border-radius: 0 8px 8px 0 !important;
      padding: 0 10px;
      height: 38px;
      display: inline-flex; align-items: center;
      cursor: pointer;
      color: #9a3fcb;
    }
    .fb-btn-compare-split:hover { background: linear-gradient(#fff8f5,#fff8f5) padding-box, linear-gradient(90deg,#ec4899,#a855f7) border-box; }
    .fb-btn-compare-main {
      border-radius: 8px 0 0 8px !important;
      border-right: none !important;
      padding-right: 8px;
    }

    /* Right view toggles */
    .fb-view-btn {
      width: 38px; height: 38px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #6b7280;
      cursor: pointer;
      font-size: 15px;
    }
    .fb-view-btn:hover { background: #f3f4f6; }
    .fb-view-btn.active {
      background: #15803d;
      border-color: #15803d;
      color: #fff;
    }

    /* ── Sub-header ── */
    .sub-header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 8px 24px;
      font-size: 13.5px;
    }
    .sub-header strong { font-weight: 700; color: #111; }

    /* ── Card ── */
    .listing-card {
      background: #fff;
      border: 1px solid #e0e3e8;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow .2s ease;
    }
    .listing-card:hover { box-shadow: 0 6px 22px rgba(0,0,0,.13); }

    /* Image */
    .img-wrap { position: relative; }
    .listing-img { width: 100%; height: 182px; object-fit: cover; display: block; }

    /* Quality badge */
    .quality-badge {
      position: absolute;
      top: 9px; left: 9px;
      background: #1976d2;
      color: #fff;
      font-size: 10.5px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 5px;
      letter-spacing: .5px;
      text-transform: uppercase;
      line-height: 1.4;
    }

    /* Info section */
    .listing-info { padding: 11px 13px 13px; }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 5px;
    }
    .listing-price { font-size: 17px; font-weight: 700; color: #111; flex-shrink: 0; }
    .listing-days  { font-size: 11.5px; color: #6b7280; white-space: nowrap; text-align: right; }

    .listing-address {
      font-size: 13px;
      color: #374151;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 9px;
      line-height: 1.3;
    }

    /* Meta row */
    .listing-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12.5px;
      color: #374151;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .meta-svg { color: #6b7280; flex-shrink: 0; }
    .meta-heart {
      margin-left: auto;
      color: #b0b8c4;
      font-size: 16px;
      cursor: pointer;
      border: none; background: none; padding: 0;
      transition: color .15s;
      line-height: 1;
      flex-shrink: 0;
    }
    .meta-heart:hover { color: #dc2626; }
    .meta-heart.saved { color: #dc2626; }

.sub-header,
#listings-grid {
  max-width: 1600px;
  margin-left: auto;
  margin-right: auto;
}


    /* ── Responsive image height ── */
    @media (max-width: 575px)  { .listing-img { height: 190px; } }
    @media (min-width: 1400px) { .listing-img { height: 188px; } }
  </style>
</head>
<body>

<!-- ── Filter Bar ── -->
<div class="filter-bar d-flex align-items-center justify-content-center">
  <div class="d-flex align-items-center gap-2" style="margin-right: 8%;">

    <!-- All Listings dropdown -->
    <select class="form-select" style="width:148px;" id="f-status" onchange="applyFilters()">
      <option value="">All Listings</option>
      <option value="For Sale">For Sale</option>
      <option value="For Rent">For Rent</option>
      <option value="Sold">Sold</option>
    </select>

    <!-- Both / type dropdown -->
    <select class="form-select" style="width:105px;" id="f-type" onchange="applyFilters()">
      <option value="">Both</option>
      <option value="Residential">Residential</option>
      <option value="Land">Land</option>
    </select>

    <!-- Advanced — green border, green icon -->
    <button class="fb-btn fb-btn-advanced"
            type="button" data-bs-toggle="collapse" data-bs-target="#advancedFilters">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
        <circle cx="9" cy="6" r="2" fill="#fff"/><circle cx="16" cy="12" r="2" fill="#fff"/>
        <circle cx="9" cy="18" r="2" fill="#fff"/>
      </svg>
      Advanced
    </button>

  </div>
</div>

<!-- ── Advanced Filters Collapse ── -->
<div class="collapse" id="advancedFilters">
  <div class="bg-white border-bottom border-light px-4 py-3">
    <div class="row g-2">
      <div class="col-12 col-sm-6 col-md-3 col-lg-2">
        <label class="form-label small fw-semibold mb-1">Min Price</label>
        <select id="f-min" class="form-select form-select-sm" onchange="applyFilters()">
          <option value="0">No Min</option>
          <option value="100000">$100k</option>
          <option value="200000">$200k</option>
          <option value="300000">$300k</option>
          <option value="500000">$500k</option>
          <option value="700000">$700k</option>
        </select>
      </div>
      <div class="col-12 col-sm-6 col-md-3 col-lg-2">
        <label class="form-label small fw-semibold mb-1">Max Price</label>
        <select id="f-max" class="form-select form-select-sm" onchange="applyFilters()">
          <option value="">No Max</option>
          <option value="200000">$200k</option>
          <option value="400000">$400k</option>
          <option value="600000">$600k</option>
          <option value="800000">$800k</option>
          <option value="1000000">$1M</option>
        </select>
      </div>
      <div class="col-12 col-sm-6 col-md-3 col-lg-2">
        <label class="form-label small fw-semibold mb-1">Min Beds</label>
        <select id="f-beds" class="form-select form-select-sm" onchange="applyFilters()">
          <option value="0">Any</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
          <option value="4">4+</option>
          <option value="5">5+</option>
        </select>
      </div>
      <div class="col-12 col-sm-6 col-md-3 col-lg-2">
        <label class="form-label small fw-semibold mb-1">Quality</label>
        <select id="f-quality" class="form-select form-select-sm" onchange="applyFilters()">
          <option value="">All</option>
          <option value="GOOD">Good</option>
          <option value="AVERAGE">Average</option>
          <option value="POOR">Poor</option>
        </select>
      </div>
      <div class="col-12 col-sm-6 col-md-3 col-lg-3">
        <label class="form-label small fw-semibold mb-1">Search Address</label>
        <input type="text" id="f-search" class="form-control form-control-sm"
               placeholder="Street, city…" oninput="applyFilters()" />
      </div>
      <div class="col-12 col-sm-6 col-md-3 col-lg-1 d-flex align-items-end">
        <button class="btn btn-outline-secondary btn-sm w-100" onclick="resetFilters()">
          <i class="bi bi-x-circle me-1"></i>Reset
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Sub-header ── -->
<div class="sub-header d-flex align-items-center justify-content-between">
  <span><strong id="count-display">0</strong> listings found</span>
  <div class="d-flex align-items-center gap-2">
    <span class="text-muted">Sort by:</span>
    <select class="form-select form-select-sm" style="width:168px;font-size:13px;font-weight:500;border-color:#d1d5db;"
            id="f-sort" onchange="applyFilters()">
      <option value="newest">Newest to oldest</option>
      <option value="oldest">Oldest to newest</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="sqft-desc">Largest first</option>
    </select>
  </div>
</div>

<!-- ── Grid ── -->
<div class="px-3 pt-3 pb-5">
  <div class="row row-cols-2 row-cols-md-3 row-cols-xl-4 row-cols-xxl-5 g-3" id="listings-grid"></div>
  <div id="no-results" class="text-center py-5" style="display:none;">
    <i class="bi bi-house-slash display-3 text-muted"></i>
    <p class="text-muted mt-3 mb-3">No listings match your filters.</p>
    <button class="btn btn-outline-primary btn-sm" onclick="resetFilters()">
      <i class="bi bi-arrow-counterclockwise me-1"></i>Reset Filters
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
const savedSet = new Set();

function toggleHeart(id, btn) {
  if (savedSet.has(id)) { savedSet.delete(id); btn.classList.remove("saved"); btn.innerHTML = '<i class="bi bi-heart"></i>'; }
  else                  { savedSet.add(id);    btn.classList.add("saved");    btn.innerHTML = '<i class="bi bi-heart-fill"></i>'; }
}

function fmtPrice(l) {
  if (l.status === "For Rent") return "$" + l.price.toLocaleString() + "/mo";
  return "$" + l.price.toLocaleString();
}

/* SVG icons — matches Repliers icon set */
const SVG = {
  bed: `<svg class="meta-svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 20V10a2 2 0 012-2h16a2 2 0 012 2v10"/>
    <path d="M2 14h20"/>
    <path d="M7 14v-3a1 1 0 011-1h3a1 1 0 011 1v3"/>
  </svg>`,
  bath: `<svg class="meta-svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 12h16v2a6 6 0 01-6 6H10a6 6 0 01-6-6v-2z"/>
    <path d="M6 12V5a2 2 0 114 0v1"/>
  </svg>`,
  sqft: `<svg class="meta-svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="7" height="7" rx="1"/>
    <rect x="14" y="3" width="7" height="7" rx="1"/>
    <rect x="3" y="14" width="7" height="7" rx="1"/>
    <rect x="14" y="14" width="7" height="7" rx="1"/>
  </svg>`,
  acres: `<svg class="meta-svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 21h18M3 7l9-4 9 4M4 7v14M20 7v14M9 21V11h6v10"/>
  </svg>`
};

function renderMeta(l) {
  if (l.acres !== null) {
    return `<span class="meta-item">${SVG.acres} ${l.acres} acres</span>`;
  }
  return `
    <span class="meta-item">${SVG.bed} ${l.beds}</span>
    <span class="meta-item">${SVG.bath} ${l.baths}</span>
    <span class="meta-item">${SVG.sqft} ${l.sqft.toLocaleString()} ft²</span>
  `;
}

function renderCard(l) {
  const saved = savedSet.has(l.id);
  return `
    <div class="col">
      <div class="listing-card">
        <div class="img-wrap">
          <img src="${l.image}" class="listing-img" alt="${l.address}" loading="lazy" />
          <span class="quality-badge">${l.quality}</span>
        </div>
        <div class="listing-info">
          <div class="price-row">
            <span class="listing-price">${fmtPrice(l)}</span>
            <span class="listing-days">${l.days} days on market</span>
          </div>
          <div class="listing-address" title="${l.address}">${l.address}</div>
          <div class="listing-meta">
            ${renderMeta(l)}
            <button class="meta-heart ${saved ? 'saved' : ''}"
                    onclick="event.stopPropagation(); toggleHeart(${l.id}, this)"
                    aria-label="Save listing">
              <i class="bi bi-heart${saved ? '-fill' : ''}"></i>
            </button>
          </div>
        </div>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════
   FILTER + SORT
═══════════════════════════════════════ */
function applyFilters() {
  const status  = document.getElementById("f-status").value;
  const type    = document.getElementById("f-type").value;
  const minP    = parseFloat(document.getElementById("f-min")?.value) || 0;
  const maxP    = parseFloat(document.getElementById("f-max")?.value) || Infinity;
  const minBeds = parseInt(document.getElementById("f-beds")?.value) || 0;
  const quality = document.getElementById("f-quality")?.value || "";
  const search  = (document.getElementById("f-search")?.value || "").trim().toLowerCase();
  const sort    = document.getElementById("f-sort").value;

  let data = listings.filter(l => {
    if (status  && l.status  !== status)  return false;
    if (type    && l.type    !== type)    return false;
    if (quality && l.quality !== quality) return false;
    if (l.price < minP || l.price > maxP) return false;
    if (minBeds && (l.beds === null || l.beds < minBeds)) return false;
    if (search  && !l.address.toLowerCase().includes(search)) return false;
    return true;
  });

  if (sort === "price-asc")  data.sort((a, b) => a.price - b.price);
  if (sort === "price-desc") data.sort((a, b) => b.price - a.price);
  if (sort === "sqft-desc")  data.sort((a, b) => (b.sqft || 0) - (a.sqft || 0));
  if (sort === "oldest")     data.sort((a, b) => b.days - a.days);
  if (sort === "newest")     data.sort((a, b) => a.days - b.days);

  const grid = document.getElementById("listings-grid");
  const noR  = document.getElementById("no-results");
  document.getElementById("count-display").textContent = data.length.toLocaleString();

  if (!data.length) {
    grid.innerHTML = "";
    noR.style.display = "block";
  } else {
    noR.style.display = "none";
    grid.innerHTML = data.map(renderCard).join("");
  }
}

function resetFilters() {
  ["f-status","f-type","f-min","f-max","f-beds","f-quality","f-sort"]
    .forEach(id => { const el = document.getElementById(id); if (el) el.selectedIndex = 0; });
  const fs = document.getElementById("f-search");
  if (fs) fs.value = "";
  applyFilters();
}

/* Boot */
applyFilters();
</script>
