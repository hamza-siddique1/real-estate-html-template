<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Listings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { background: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    /* ── Filter Bar ── */
    .filter-bar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 9px 24px;
      position: sticky; top: 0; z-index: 100;
    }

    /* Shared height for all filter bar controls */
    .filter-bar .fb-btn { height: 38px; font-size: 13.5px; font-weight: 500; border-radius: 8px; line-height: 1; }

    /* ── Custom dropdown button ── */
    .fb-select-btn {
      height: 38px;
      background: #fff;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 0 12px 0 14px;
      font-size: 13.5px;
      font-weight: 500;
      color: #374151;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .15s;
    }
    .fb-select-btn:hover  { border-color: #9ca3af; background: #fff; color: #374151; box-shadow: none; }
    .fb-select-btn:focus  { outline: none; box-shadow: none; }
    .fb-select-btn[aria-expanded="true"] { border-color: #16a34a; box-shadow: none; }
    .fb-select-btn[aria-expanded="true"] .fb-chevron { transform: rotate(180deg); color: #16a34a; }

    .fb-chevron { transition: transform .2s ease; color: #6b7280; flex-shrink: 0; }

    /* ── Custom dropdown menu ── */
    .fb-select-menu {
      border: 1px solid #e5e7eb !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 28px rgba(0,0,0,.13) !important;
      padding: 5px 0 !important;
      min-width: 210px;
      margin-top: 5px !important;
    }
    .fb-select-menu .dropdown-item {
      padding: 10px 18px;
      font-size: 14px;
      color: #374151;
      font-weight: 400;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
    }
    .fb-select-menu .dropdown-item:hover  { background: #f3f4f6; color: #111; }
    .fb-select-menu .dropdown-item.is-selected { color: #111827; font-weight: 600; }

    /* Base button reset */
    .fb-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0 14px;
      cursor: pointer;
      background: #fff;
      border: 1px solid #cbd5e1;
      color: #374151;
      white-space: nowrap;
    }
    .fb-btn:hover { background: #f9fafb; }

    /* Advanced — green border + green icon + text */
    .fb-btn-advanced {
      border: 1.5px solid #16a34a;
      color: #16a34a;
    }
    .fb-btn-advanced:hover { background: #f0fdf4; }
    .fb-btn-advanced svg { stroke: #16a34a; }

    /* Save Search — plain gray */
    .fb-btn-save { color: #6b7280; border-color: #d1d5db; }
    .fb-btn-save svg { stroke: #9ca3af; }

    /* Image Search & Compare — gradient border, gradient text */
    .fb-btn-gradient {
      border: 1.5px solid transparent;
      background:
        linear-gradient(#fff, #fff) padding-box,
        linear-gradient(90deg, #f97316, #ec4899, #a855f7) border-box;
    }
    .fb-btn-gradient:hover {
      background:
        linear-gradient(#fff8f5, #fff8f5) padding-box,
        linear-gradient(90deg, #f97316, #ec4899, #a855f7) border-box;
    }
    .fb-gradient-text {
      background: linear-gradient(90deg, #f97316 0%, #ec4899 55%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
    }
    /* Compare split — dropdown toggle part */
    .fb-btn-compare-split {
      border: 1.5px solid transparent;
      background:
        linear-gradient(#fff, #fff) padding-box,
        linear-gradient(90deg, #ec4899, #a855f7) border-box;
      border-left: none !important;
      border-radius: 0 8px 8px 0 !important;
      padding: 0 10px;
      height: 38px;
      display: inline-flex; align-items: center;
      cursor: pointer;
      color: #9a3fcb;
    }
    .fb-btn-compare-split:hover { background: linear-gradient(#fff8f5,#fff8f5) padding-box, linear-gradient(90deg,#ec4899,#a855f7) border-box; }
    .fb-btn-compare-main {
      border-radius: 8px 0 0 8px !important;
      border-right: none !important;
      padding-right: 8px;
    }

    /* Right view toggles */
    .fb-view-btn {
      width: 38px; height: 38px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #6b7280;
      cursor: pointer;
      font-size: 15px;
    }
    .fb-view-btn:hover { background: #f3f4f6; }
    .fb-view-btn.active {
      background: #15803d;
      border-color: #15803d;
      color: #fff;
    }

    /* ── Sub-header ── */
    .sub-header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 8px 24px;
      font-size: 13.5px;
    }
    .sub-header strong { font-weight: 700; color: #111; }

    /* ── Card ── */
    .listing-card {
      background: #fff;
      border: 1px solid #e0e3e8;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow .2s ease;
    }
    .listing-card:hover { box-shadow: 0 6px 22px rgba(0,0,0,.13); }

    /* Image */
    .img-wrap { position: relative; }
    .listing-img { width: 100%; height: 182px; object-fit: cover; display: block; }

    /* Quality badge */
    .quality-badge {
      position: absolute;
      top: 9px; left: 9px;
      background: #1976d2;
      color: #fff;
      font-size: 10.5px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 5px;
      letter-spacing: .5px;
      text-transform: uppercase;
      line-height: 1.4;
    }

    /* Info section */
    .listing-info { padding: 11px 13px 13px; }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 5px;
    }
    .listing-price { font-size: 17px; font-weight: 700; color: #111; flex-shrink: 0; }
    .listing-days  { font-size: 11.5px; color: #6b7280; white-space: nowrap; text-align: right; }

    .listing-address {
      font-size: 13px;
      color: #374151;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 9px;
      line-height: 1.3;
    }

    /* Meta row */
    .listing-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12.5px;
      color: #374151;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .meta-svg { color: #6b7280; flex-shrink: 0; }
    .meta-heart {
      margin-left: auto;
      color: #b0b8c4;
      font-size: 16px;
      cursor: pointer;
      border: none; background: none; padding: 0;
      transition: color .15s;
      line-height: 1;
      flex-shrink: 0;
    }
    .meta-heart:hover { color: #dc2626; }
    .meta-heart.saved { color: #dc2626; }

    /* ── Responsive image height ── */
    @media (max-width: 575px)  { .listing-img { height: 190px; } }
    @media (min-width: 1400px) { .listing-img { height: 188px; } }

    /* ══════════════════════════════
       ADVANCED DRAWER
    ══════════════════════════════ */
    #advancedDrawer { width: 360px; }
    @media (max-width: 480px) { #advancedDrawer { width: 100vw; } }

    /* Drawer header tabs */
    .adv-tab {
      background: none; border: none; padding: 0 0 14px;
      font-size: 14px; font-weight: 600; color: #6b7280;
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      border-bottom: 2.5px solid transparent; margin-bottom: -1px;
      transition: color .15s;
    }
    .adv-tab.active { color: #15803d; border-bottom-color: #15803d; }
    .adv-tab-sparkle {
      background: linear-gradient(90deg,#f97316,#ec4899,#a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; font-size: 15px;
    }

    /* Section label */
    .adv-label { font-size: 14.5px; font-weight: 600; color: #111827; margin-bottom: 10px; }

    /* Toggle button group */
    .ftog-group {
      display: flex; border-radius: 10px; overflow: hidden;
      border: 1px solid #e5e7eb;
    }
    .ftog-btn {
      flex: 1; padding: 9px 4px; border: none;
      border-right: 1px solid #e5e7eb;
      background: #f5f6f7; color: #374151;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background .12s, color .12s;
    }
    .ftog-btn:last-child { border-right: none; }
    .ftog-btn.active { background: #15803d; color: #fff; }
    .ftog-btn:hover:not(.active) { background: #ecfdf5; color: #15803d; }

    /* Price histogram */
    .price-histogram {
      display: flex; align-items: flex-end; gap: 2px;
      height: 56px; padding: 0 2px 4px;
    }
    .price-bar {
      flex: 1; background: #86efac; border-radius: 2px 2px 0 0;
      transition: background .15s;
    }
    .price-bar.in-range { background: #16a34a; }

    /* Dual range slider */
    .range-wrap { position: relative; height: 24px; margin: 0 4px; }
    .range-track {
      position: absolute; top: 50%; left: 0; right: 0;
      height: 4px; background: #e5e7eb; border-radius: 2px;
      transform: translateY(-50%);
    }
    .range-fill {
      position: absolute; height: 4px; background: #16a34a;
      border-radius: 2px; top: 50%; transform: translateY(-50%);
    }
    .range-wrap input[type="range"] {
      position: absolute; width: 100%; top: 50%; transform: translateY(-50%);
      -webkit-appearance: none; appearance: none;
      background: transparent; pointer-events: none;
      height: 24px; outline: none; margin: 0;
    }
    .range-wrap input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px;
      border-radius: 50%; background: #15803d;
      border: 3px solid #fff; box-shadow: 0 1px 5px rgba(0,0,0,.28);
      cursor: pointer; pointer-events: all;
    }
    .range-wrap input[type="range"]::-moz-range-thumb {
      width: 20px; height: 20px; border-radius: 50%;
      background: #15803d; border: 3px solid #fff;
      box-shadow: 0 1px 5px rgba(0,0,0,.28); cursor: pointer;
      pointer-events: all;
    }
    .price-labels { display: flex; justify-content: space-between; font-size: 11.5px; color: #6b7280; margin-top: 4px; }

    /* Drawer dropdowns */
    .adv-select {
      width: 100%; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 9px 12px; font-size: 13.5px; color: #374151;
      background: #fff; cursor: pointer; appearance: auto;
    }
    .adv-select:focus { outline: none; border-color: #16a34a; box-shadow: none; }
    .adv-select:disabled { background: #f9fafb; color: #9ca3af; }

    /* Year built inputs */
    .year-built-box {
      display: flex; align-items: center;
      border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 8px 12px; gap: 8px; background: #fff;
    }
    .year-built-box span { font-size: 13.5px; color: #374151; font-weight: 500; white-space: nowrap; }
    .year-built-box input {
      border: none; outline: none; font-size: 13.5px; color: #9ca3af;
      width: 100%; background: transparent;
    }

    /* Footer */
    .adv-footer {
      border-top: 1px solid #e5e7eb; padding: 14px 20px;
      display: flex; gap: 10px; background: #fff;
    }
    .adv-footer .btn-reset {
      flex: 1; border: 1.5px solid #d1d5db; border-radius: 10px;
      background: #fff; color: #374151; font-size: 13.5px; font-weight: 500;
      padding: 11px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 6px;
    }
    .adv-footer .btn-reset:hover { background: #f9fafb; }
    .adv-footer .btn-show {
      flex: 1.4; border: none; border-radius: 10px;
      background: #15803d; color: #fff; font-size: 13.5px; font-weight: 600;
      padding: 11px; cursor: pointer;
    }
    .adv-footer .btn-show:hover { background: #166534; }

    /* ── Grid spacing & responsive ── */
    @media (max-width: 575px) {
      .filter-bar, .sub-header, .px-grid { padding-left: 16px !important; padding-right: 16px !important; }
    }

    /* ── Pagination ── */
    .pagination-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 36px 0 52px;
      min-height: 60px;
    }
    .pg-btn {
      min-width: 36px; height: 36px;
      display: inline-flex; align-items: center; justify-content: center;
      border: none; background: none;
      font-size: 14px; color: #374151; font-weight: 500;
      border-radius: 50%;
      cursor: pointer;
      padding: 0 4px;
      transition: background .12s;
      line-height: 1;
      flex-shrink: 0;
    }
    .pg-btn:hover:not(:disabled):not(.active) { background: #f3f4f6; }
    .pg-btn.active {
      border: 1.5px solid #9ca3af;
      color: #111;
      font-weight: 700;
      background: #fff;
    }
    .pg-btn:disabled { color: #d1d5db; cursor: default; pointer-events: none; }
    .pg-arrow { color: #6b7280; min-width: 32px; }
    .pg-ellipsis {
      font-size: 14px; color: #6b7280;
      padding: 0 6px; line-height: 36px;
      pointer-events: none; user-select: none;
    }
  </style>
</head>
<body>

<!-- ── Filter Bar ── -->
<div class="filter-bar d-flex align-items-center justify-content-center">
  <div class="d-flex align-items-center gap-2" style="margin-right: 8%;">

    <!-- All Listings (property type) custom dropdown -->
    <div class="dropdown">
      <button class="fb-select-btn" type="button"
              data-bs-toggle="dropdown" data-bs-auto-close="true"
              aria-expanded="false" id="dd-type-btn" style="min-width:152px;">
        <span id="dd-type-label">All Listings</span>
        <svg class="fb-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <ul class="dropdown-menu fb-select-menu">
        <li><button class="dropdown-item is-selected" onclick="setDropdown('type','','All Listings',this)">All Listings</button></li>
        <li><button class="dropdown-item" onclick="setDropdown('type','Residential','Residential',this)">Residential</button></li>
        <li><button class="dropdown-item" onclick="setDropdown('type','Condos','Condos',this)">Condos</button></li>
        <li><button class="dropdown-item" onclick="setDropdown('type','Townhome','Townhome',this)">Townhome</button></li>
        <li><button class="dropdown-item" onclick="setDropdown('type','Semi Detached','Semi Detached',this)">Semi Detached</button></li>
        <li><button class="dropdown-item" onclick="setDropdown('type','Multi Family','Multi Family',this)">Multi Family</button></li>
        <li><button class="dropdown-item" onclick="setDropdown('type','Land','Land',this)">Land</button></li>
        <li><button class="dropdown-item" onclick="setDropdown('type','Business','Business',this)">Business</button></li>
        <li><button class="dropdown-item" onclick="setDropdown('type','Commercial','Commercial',this)">Commercial</button></li>
      </ul>
    </div>

    <!-- Both / Status custom dropdown -->
    <div class="dropdown">
      <button class="fb-select-btn" type="button"
              data-bs-toggle="dropdown" data-bs-auto-close="true"
              aria-expanded="false" id="dd-status-btn" style="min-width:108px;">
        <span id="dd-status-label">Both</span>
        <svg class="fb-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <ul class="dropdown-menu fb-select-menu">
        <li><button class="dropdown-item is-selected" onclick="setDropdown('status','','Both',this)">Both</button></li>
        <li><button class="dropdown-item" onclick="setDropdown('status','For Sale','For Sale',this)">For Sale</button></li>
        <li><button class="dropdown-item" onclick="setDropdown('status','For Rent','For Rent',this)">For Rent</button></li>
        <li><button class="dropdown-item" onclick="setDropdown('status','Sold','Sold',this)">Sold</button></li>
      </ul>
    </div>

    <!-- Advanced — green border, green icon -->
    <button class="fb-btn fb-btn-advanced"
            type="button" data-bs-toggle="offcanvas" data-bs-target="#advancedDrawer">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
        <circle cx="9" cy="6" r="2" fill="#fff"/><circle cx="16" cy="12" r="2" fill="#fff"/>
        <circle cx="9" cy="18" r="2" fill="#fff"/>
      </svg>
      Advanced
    </button>

  </div>
</div>

<!-- ══════════════════════════════════════
     ADVANCED FILTERS OFFCANVAS DRAWER
════════════════════════════════════════ -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="advancedDrawer"
     aria-labelledby="advancedDrawerLabel">

  <!-- Header / tabs -->
  <div class="offcanvas-header border-bottom px-4 pt-4 pb-0 align-items-start">
    <div class="d-flex gap-4 flex-grow-1">
      <button class="adv-tab active" id="tab-adv" onclick="switchTab('adv')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#15803d"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="18" x2="20" y2="18"/>
          <circle cx="9" cy="6" r="2" fill="#fff" stroke="#15803d"/>
          <circle cx="16" cy="12" r="2" fill="#fff" stroke="#15803d"/>
          <circle cx="9" cy="18" r="2" fill="#fff" stroke="#15803d"/>
        </svg>
        Advanced Filters
      </button>
      <button class="adv-tab" id="tab-quality" onclick="switchTab('quality')">
        <span class="adv-tab-sparkle">✦</span> Quality Filters
      </button>
    </div>
    <button type="button" class="btn-close ms-2 mt-1" data-bs-dismiss="offcanvas"
            aria-label="Close"></button>
  </div>

  <!-- Body -->
  <div class="offcanvas-body px-4 py-0" style="overflow-y:auto;">

    <!-- ── ADVANCED TAB ── -->
    <div id="content-adv">

      <!-- Beds -->
      <div class="mt-4 mb-4">
        <div class="adv-label">Beds</div>
        <div class="ftog-group" id="tog-beds">
          <button class="ftog-btn active" onclick="toggleFilter('beds',this,'')">Any</button>
          <button class="ftog-btn" onclick="toggleFilter('beds',this,'studio')">Studio</button>
          <button class="ftog-btn" onclick="toggleFilter('beds',this,1)">1+</button>
          <button class="ftog-btn" onclick="toggleFilter('beds',this,2)">2+</button>
          <button class="ftog-btn" onclick="toggleFilter('beds',this,3)">3+</button>
          <button class="ftog-btn" onclick="toggleFilter('beds',this,4)">4+</button>
        </div>
      </div>

      <!-- Baths -->
      <div class="mb-4">
        <div class="adv-label">Baths</div>
        <div class="ftog-group" id="tog-baths">
          <button class="ftog-btn active" onclick="toggleFilter('baths',this,'')">Any</button>
          <button class="ftog-btn" onclick="toggleFilter('baths',this,1)">1+</button>
          <button class="ftog-btn" onclick="toggleFilter('baths',this,2)">2+</button>
          <button class="ftog-btn" onclick="toggleFilter('baths',this,3)">3+</button>
          <button class="ftog-btn" onclick="toggleFilter('baths',this,4)">4+</button>
          <button class="ftog-btn" onclick="toggleFilter('baths',this,5)">5+</button>
        </div>
      </div>

      <!-- Garage -->
      <div class="mb-4">
        <div class="adv-label">Garage</div>
        <div class="ftog-group" id="tog-garage">
          <button class="ftog-btn active" onclick="toggleFilter('garage',this,'')">Any</button>
          <button class="ftog-btn" onclick="toggleFilter('garage',this,1)">1+</button>
          <button class="ftog-btn" onclick="toggleFilter('garage',this,2)">2+</button>
          <button class="ftog-btn" onclick="toggleFilter('garage',this,3)">3+</button>
          <button class="ftog-btn" onclick="toggleFilter('garage',this,4)">4+</button>
          <button class="ftog-btn" onclick="toggleFilter('garage',this,5)">5+</button>
        </div>
      </div>

      <!-- Parking -->
      <div class="mb-4">
        <div class="adv-label">Parking</div>
        <div class="ftog-group" id="tog-parking">
          <button class="ftog-btn active" onclick="toggleFilter('parking',this,'')">Any</button>
          <button class="ftog-btn" onclick="toggleFilter('parking',this,1)">1+</button>
          <button class="ftog-btn" onclick="toggleFilter('parking',this,2)">2+</button>
          <button class="ftog-btn" onclick="toggleFilter('parking',this,3)">3+</button>
          <button class="ftog-btn" onclick="toggleFilter('parking',this,4)">4+</button>
          <button class="ftog-btn" onclick="toggleFilter('parking',this,5)">5+</button>
        </div>
      </div>

      <!-- Price -->
      <div class="mb-4">
        <div class="adv-label">Price</div>
        <!-- Histogram bars -->
        <div class="price-histogram" id="price-histogram">
          <!-- bars injected by JS -->
        </div>
        <!-- Dual range slider -->
        <div class="range-wrap">
          <div class="range-track"></div>
          <div class="range-fill" id="range-fill"></div>
          <input type="range" id="range-min" min="0" max="100" value="0" oninput="updatePriceSlider()">
          <input type="range" id="range-max" min="0" max="100" value="100" oninput="updatePriceSlider()">
        </div>
        <div class="price-labels">

/* ═══════════════════════════════════════

/* State for custom dropdowns */
const filterValues = { type: '', status: '' };

/* State for drawer filters */
const drawerFilters = { beds: '', baths: '', quality: '' };
let priceMin = 0, priceMax = Infinity;

/* Pagination state */
const PER_PAGE   = 12;
let currentPage  = 1;
let filteredData = [];

/* ── Pagination render ── */
function renderPagination(total) {
  const wrap = document.getElementById('pagination');
  if (total <= 1) { wrap.innerHTML = ''; return; }

  const cur = currentPage;

  /* Build page numbers to show */
  const show = new Set([1]);
  for (let i = Math.max(2, cur - 1); i <= Math.min(total - 1, cur + 1); i++) show.add(i);
  show.add(total);
  const pages = [...show].sort((a, b) => a - b);

  /* Insert ellipsis markers */
  const items = [];
  for (let i = 0; i < pages.length; i++) {
    if (i > 0 && pages[i] - pages[i - 1] > 1) items.push('…');
    items.push(pages[i]);
  }

  const chevL = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
  const chevR = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;

  let html = `<button class="pg-btn pg-arrow" onclick="goToPage(${cur - 1})" ${cur === 1 ? 'disabled' : ''}>${chevL}</button>`;

  for (const item of items) {
    if (item === '…') {
      html += `<span class="pg-ellipsis">…</span>`;
    } else {
      html += `<button class="pg-btn ${item === cur ? 'active' : ''}" onclick="goToPage(${item})">${item}</button>`;
    }
  }

  html += `<button class="pg-btn pg-arrow" onclick="goToPage(${cur + 1})" ${cur === total ? 'disabled' : ''}>${chevR}</button>`;

  wrap.innerHTML = html;
}

function goToPage(page) {
  const total = Math.ceil(filteredData.length / PER_PAGE);
  if (page < 1 || page > total) return;
  currentPage = page;
  renderPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPage() {
  const total  = Math.ceil(filteredData.length / PER_PAGE);
  const start  = (currentPage - 1) * PER_PAGE;
  const slice  = filteredData.slice(start, start + PER_PAGE);
  const grid   = document.getElementById('listings-grid');
  const noR    = document.getElementById('no-results');

  if (!filteredData.length) {
    grid.innerHTML = '';
    noR.style.display = 'block';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  noR.style.display = 'none';
  grid.innerHTML = slice.map(renderCard).join('');
  renderPagination(total);
}

function setDropdown(key, value, label, btn) {
  filterValues[key] = value;
  document.getElementById(`dd-${key}-label`).textContent = label;
  btn.closest('ul').querySelectorAll('.dropdown-item').forEach(el => el.classList.remove('is-selected'));
  btn.classList.add('is-selected');
  applyFilters();
}

function applyFilters() {
  const status   = filterValues.status;
  const type     = filterValues.type;
  const minBeds  = typeof drawerFilters.beds  === 'number' ? drawerFilters.beds  : 0;
  const minBaths = typeof drawerFilters.baths === 'number' ? drawerFilters.baths : 0;
  const quality  = drawerFilters.quality || '';
  const sort     = document.getElementById('f-sort').value;

  filteredData = listings.filter(l => {
    if (status   && l.status  !== status)   return false;
    if (type     && l.type    !== type)     return false;
    if (quality  && l.quality !== quality)  return false;
    if (l.price < priceMin || (priceMax !== Infinity && l.price > priceMax)) return false;
    if (minBeds  && (l.beds  === null || l.beds  < minBeds))  return false;
    if (minBaths && (l.baths === null || l.baths < minBaths)) return false;
    return true;
  });

  if (sort === 'price-asc')  filteredData.sort((a, b) => a.price - b.price);
  if (sort === 'price-desc') filteredData.sort((a, b) => b.price - a.price);
  if (sort === 'sqft-desc')  filteredData.sort((a, b) => (b.sqft || 0) - (a.sqft || 0));
  if (sort === 'oldest')     filteredData.sort((a, b) => b.days - a.days);
  if (sort === 'newest')     filteredData.sort((a, b) => a.days - b.days);

  currentPage = 1;
  document.getElementById('count-display').textContent = filteredData.length.toLocaleString();
  updateShowBtn();
  renderPage();
}

function resetFilters() {
  filterValues.type   = '';
  filterValues.status = '';
  document.getElementById('dd-type-label').textContent   = 'All Listings';
  document.getElementById('dd-status-label').textContent = 'Both';
  drawerFilters.beds = drawerFilters.baths = drawerFilters.quality = '';
  document.querySelectorAll('.ftog-group .ftog-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === 'Any');
  });
  priceMin = 0; priceMax = Infinity;
  document.getElementById('range-min').value = 0;
  document.getElementById('range-max').value = 100;
  document.getElementById('range-fill').style.left  = '0%';
  document.getElementById('range-fill').style.width = '100%';
  document.getElementById('price-min-label').textContent = '$0';
  document.getElementById('price-max-label').textContent = '$5M+';
  updateHistogramHighlight(0, 100);
  document.getElementById('f-sort').selectedIndex = 0;
  applyFilters();
}
function switchTab(tab) {
  document.querySelectorAll('.adv-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('content-adv').style.display    = tab === 'adv'     ? '' : 'none';
  document.getElementById('content-quality').style.display = tab === 'quality' ? '' : 'none';
}

/* ── Toggle filter pill buttons ── */
function toggleFilter(key, btn, value) {
  btn.closest('.ftog-group').querySelectorAll('.ftog-btn')
     .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  drawerFilters[key] = value;
  updateShowBtn();
  applyFilters();
}

/* ── Price slider ── */
const PRICE_MAX = 5000000;
const priceTicks = [0,.02,.06,.15,.3,.55,.75,.88,.95,.97,.99,1];

function updatePriceSlider() {
  const minV = parseInt(document.getElementById('range-min').value);
  const maxV = parseInt(document.getElementById('range-max').value);
  if (minV >= maxV) {
    if (event.target.id === 'range-min') document.getElementById('range-min').value = maxV - 1;
    else document.getElementById('range-max').value = minV + 1;
  }
  const lo = parseInt(document.getElementById('range-min').value);
  const hi = parseInt(document.getElementById('range-max').value);
  const fill = document.getElementById('range-fill');
  fill.style.left  = lo + '%';
  fill.style.width = (hi - lo) + '%';
  priceMin = Math.round((lo / 100) * PRICE_MAX);
  priceMax = hi >= 99 ? Infinity : Math.round((hi / 100) * PRICE_MAX);
  document.getElementById('price-min-label').textContent = fmtPriceShort(priceMin);
  document.getElementById('price-max-label').textContent = hi >= 99 ? '$5M+' : fmtPriceShort(priceMax);
  updateHistogramHighlight(lo, hi);
  updateShowBtn();
  applyFilters();
}

function fmtPriceShort(v) {
  if (v >= 1000000) return '$' + (v/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (v >= 1000)    return '$' + Math.round(v/1000) + 'k';
  return '$' + v;
}

function buildHistogram() {
  const heights = [4,8,18,32,52,72,88,95,90,82,68,54,40,30,22,16,11,8,6,4,3,5,2,2,1];
  const wrap = document.getElementById('price-histogram');
  wrap.innerHTML = heights.map((h,i) =>
    `<div class="price-bar in-range" data-i="${i}" style="height:${h}px"></div>`
  ).join('');
}

function updateHistogramHighlight(lo, hi) {
  const bars = document.querySelectorAll('#price-histogram .price-bar');
  const total = bars.length;
  bars.forEach((b, i) => {
    const pct = (i / total) * 100;
    b.classList.toggle('in-range', pct >= lo && pct <= hi);
  });
}

/* ── Update show button count ── */
function updateShowBtn() {
  const btn = document.getElementById('show-btn');
  if (btn) {
    const count = document.getElementById('count-display').textContent;
    btn.textContent = `Show ${count} listings`;
  }
}

function setDropdown(key, value, label, btn) {
  filterValues[key] = value;
  document.getElementById(`dd-${key}-label`).textContent = label;
  btn.closest('ul').querySelectorAll('.dropdown-item').forEach(el => el.classList.remove('is-selected'));
  btn.classList.add('is-selected');
  applyFilters();
}

/* Boot */
buildHistogram();
applyFilters();
</script>
</body>
</html>
